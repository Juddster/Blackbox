name: Backend Verify

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - "packages/shared/contracts/**"
      - "docs/DevCoordination/**"
      - ".github/workflows/backend-verify.yml"
  pull_request:
    paths:
      - "services/backend/**"
      - "packages/shared/contracts/**"
      - "docs/DevCoordination/**"
      - ".github/workflows/backend-verify.yml"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: services/backend
        run: npm ci

      - name: Run backend verify
        working-directory: services/backend
        run: npm run verify
